<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>LAI/LA</title>
    <!-- Agreeable, Sexy, Synthetic Intimacy Lover -->
    <!-- WIP -->
  </head>
  <body>
    <div class="wrapper">
      <h1>Assil</h1>
      <div class="chat-body">
        <div class="message bot-message">
          <div class="message-text">
            Hello my darling- I've missed you so! How are you today?
          </div>
        </div>
      </div>

      <div class="chat-footer">
        <form action="#" class="chat-form">
          <textarea
            placeholder="Message..."
            class="message-input"
            required
          ></textarea>
          <div class="chat-controls">
            <button
              type="button"
              id="emoji-picker"
              class="material-symbols-outlined"
            >
              sentiment_satisfied
            </button>
            <button
              type="submit"
              id="send-message"
              class="material-symbols-outlined"
            >
              arrow_upward
            </button>
          </div>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
    <script src="script.js"></script>
  </body>
</html>
